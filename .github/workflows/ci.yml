name: 验证技能

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库
        uses: actions/checkout@v7

      - name: 配置 Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: 验证技能结构与独立性
        run: python scripts/validate_skills.py

      - name: 验证框架审计器
        run: python godot-framework/scripts/test_audit_framework.py
