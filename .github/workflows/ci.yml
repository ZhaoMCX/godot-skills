name: 验证技能

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 配置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 验证技能结构与独立性
        run: python scripts/validate_skills.py

      - name: 验证框架审计器
        run: python godot-framework/scripts/test_audit_framework.py

      - name: 下载 Godot 4.7.1
        shell: bash
        run: |
          curl --fail --location --retry 3 \
            --output godot.zip \
            https://github.com/godotengine/godot-builds/releases/download/4.7.1-stable/Godot_v4.7.1-stable_linux.x86_64.zip
          echo "c7ff14fd28472c8d4f193043de30278dcf7e5241a1dcf7566b02e27addaa33ba  godot.zip" | sha256sum --check
          unzip -q godot.zip -d .godot-bin
          chmod +x .godot-bin/Godot_v4.7.1-stable_linux.x86_64
          echo "GODOT_BIN=$PWD/.godot-bin/Godot_v4.7.1-stable_linux.x86_64" >> "$GITHUB_ENV"

      - name: 验证 godot-dev 契约清单
        shell: bash
        run: |
          "$GODOT_BIN" --headless \
            --path godot-dev/tests/fixture_project \
            --script "$PWD/godot-dev/scripts/validate_contract.gd" -- \
            --manifest "$PWD/godot-dev/references/contracts/godot-4.7/manifest.json" \
            --require-complete

      - name: 运行 godot-dev 自测与夹具
        shell: bash
        run: |
          fixture="$PWD/godot-dev/tests/fixture_project"
          "$GODOT_BIN" --headless --path "$fixture" --script "$PWD/godot-dev/scripts/self_test.gd"
          "$GODOT_BIN" --headless --path "$fixture" --script "$fixture/verify_animation_tree.gd" -- --verify-direct
          for script in \
            verify_dependency_closure.gd \
            verify_direct_text.gd \
            verify_project_runner.gd \
            verify_runtime_contexts.gd \
            verify_scene_audit.gd; do
            "$GODOT_BIN" --headless --path "$fixture" --script "$fixture/$script"
          done
